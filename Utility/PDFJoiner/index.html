<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF結合ツール</title>

<link rel="stylesheet" href="./../../css/common-style.css">
<link rel="stylesheet" href="./../../css/common-style2.css">

<style>
#pages{display:flex;flex-wrap:wrap;gap:10px}
.page{border:1px solid #ccc;padding:5px;width:120px;background:#fff}
.page canvas{width:100%;height:auto}
</style>

</head>
<body>
<h1>PDF結合ツール</h1>
<div id="dropArea">PDFをドラッグ&ドロップ or クリック</div>
<input type="file" id="fileInput" accept="application/pdf" multiple hidden>
<div id="pages"></div>
<div>
<label><input type="radio" name="sizeMode" value="original" checked> そのまま</label>
<label><input type="radio" name="sizeMode" value="fitWidth"> 幅を統一</label>
<label><input type="radio" name="sizeMode" value="fitHeight"> 高さを統一</label>
</div>
<button id="downloadBtn">PDFをダウンロード</button>

<script type="module">
import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs";
import { PDFDocument, degrees } from "https://cdn.jsdelivr.net/npm/pdf-lib/+esm";

pdfjsLib.GlobalWorkerOptions.workerSrc = "./pdf.worker.min.mjs";

const dropArea=document.getElementById("dropArea")
const fileInput=document.getElementById("fileInput")
const pagesDiv=document.getElementById("pages")
const downloadBtn=document.getElementById("downloadBtn")

let pages=[]

// {pdfBytes, pageIndex, rotation}

function render(){
pagesDiv.innerHTML=""

pages.forEach((p,i)=>{
const div=document.createElement("div")
div.className="page"
div.draggable=true

const canvas=document.createElement("canvas")
div.appendChild(canvas)

const ctrl=document.createElement("div")
ctrl.className="controls"

const rotBtn=document.createElement("button")
rotBtn.textContent="回転"
rotBtn.onclick=()=>{
p.rotation=(p.rotation+90)%360
render()
}

const delBtn=document.createElement("button")
delBtn.textContent="削除"
delBtn.onclick=()=>{
pages.splice(i,1)
render()
}

ctrl.appendChild(rotBtn)
ctrl.appendChild(delBtn)

div.appendChild(ctrl)

// drag

div.ondragstart=e=>e.dataTransfer.setData("i",i)
div.ondragover=e=>e.preventDefault()
div.ondrop=e=>{
const from=e.dataTransfer.getData("i")
const temp=pages[from]
pages.splice(from,1)
pages.splice(i,0,temp)
render()
}

pagesDiv.appendChild(div)

// preview
renderPage(p,canvas)
})
}

function getSizeMode(){
return document.querySelector('input[name="sizeMode"]:checked').value
}

async function renderPage(p,canvas){
const pdf = await pdfjsLib.getDocument({
data: new Uint8Array(p.fileBytes.slice())
}).promise
const page=await pdf.getPage(p.pageIndex+1)

const viewport=page.getViewport({scale:0.5,rotation:p.rotation})
canvas.width=viewport.width
canvas.height=viewport.height

await page.render({canvasContext:canvas.getContext("2d"),viewport}).promise
}

async function addFile(file){
const buf = await file.arrayBuffer()

// ★ 完全に別コピーを2つ作る
const view = new Uint8Array(buf)
const forPdfjs = new Uint8Array(view)   // ← pdf.js用
const forStore = new Uint8Array(view)   // ← 保存用（絶対触らせない）

const pdf = await pdfjsLib.getDocument({
data: forPdfjs
}).promise

for(let i=0;i<pdf.numPages;i++){
pages.push({
fileBytes: new Uint8Array(forStore.slice()), // ← 常にクリーンなコピー
pageIndex: i,
rotation: 0
})
}

render()
}

// UI

dropArea.onclick=()=>fileInput.click()
fileInput.onchange=e=>{
for(const f of e.target.files) addFile(f)
}

dropArea.ondragover=e=>e.preventDefault()
dropArea.ondrop=e=>{
e.preventDefault()
for(const f of e.dataTransfer.files) addFile(f)
}

// export
downloadBtn.onclick = async () => {
  const out = await PDFDocument.create()
  const sizeMode = getSizeMode()

  let maxWidth = 0
  let maxHeight = 0

  // =========================
  // 1回目：回転後サイズで最大値取得
  // =========================
  for (const p of pages) {
    const src = await PDFDocument.load(p.fileBytes)
    const page = src.getPage(p.pageIndex)

    let { width, height } = page.getSize()

    // ★ rotation：回転後サイズに変換
    if (p.rotation === 90 || p.rotation === 270) {
      ;[width, height] = [height, width]
    }

    if (width > maxWidth) maxWidth = width
    if (height > maxHeight) maxHeight = height
  }

  // =========================
  // 2回目：描画
  // =========================
  for (const p of pages) {
    const src = await PDFDocument.load(p.fileBytes)
    const srcPage = src.getPage(p.pageIndex)
    const [embedded] = await out.embedPages([srcPage])

    // 元サイズ
    let { width, height } = srcPage.getSize()

    // ★ rotation：回転後サイズを別で作る
    let rotatedWidth = width
    let rotatedHeight = height

    if (p.rotation === 90 || p.rotation === 270) {
      ;[rotatedWidth, rotatedHeight] = [height, width]
    }

    // =========================
    // scale（回転後サイズ基準）
    // =========================
    let scale = 1

    if (sizeMode === "fitWidth") {
      scale = maxWidth / rotatedWidth
    } else if (sizeMode === "fitHeight") {
      scale = maxHeight / rotatedHeight
    }

    // =========================
    // ページサイズ（回転後）
    // =========================
    const newWidth = rotatedWidth * scale
    const newHeight = rotatedHeight * scale

    const page = out.addPage([newWidth, newHeight])

    // =========================
    // 描画サイズ（元サイズ基準）
    // =========================
    const drawWidth = width * scale
    const drawHeight = height * scale

    // =========================
    // ★ rotation：位置補正（これがないと白くなる）
    // =========================
    let x = 0
    let y = 0

    if (p.rotation === 90) {
      x = newWidth
    } else if (p.rotation === 180) {
      x = newWidth
      y = newHeight
    } else if (p.rotation === 270) {
      y = newHeight
    }

    // =========================
    // 描画
    // =========================
    page.drawPage(embedded, {
      x,
      y,
      width: drawWidth,
      height: drawHeight,
      rotate: degrees(-p.rotation) // ← ここはそのままでOK（あなたの仕様）
    })
  }

  // =========================
  // 保存
  // =========================
  const pdfBytes = await out.save()
  const blob = new Blob([pdfBytes], { type: "application/pdf" })
  const url = URL.createObjectURL(blob)

  const a = document.createElement("a")
  a.href = url
  a.download = "merged.pdf"
  a.click()

  URL.revokeObjectURL(url)
}

</script>
</body>
</html>
