<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Training Log Viewer</title>

<link rel="stylesheet" href="./../../css/common-style.css">
<link rel="stylesheet" href="./../../css/common-style2.css">
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
.graphBox{
margin-top:40px;
}

.rangeBox{
display:flex;
align-items:center;
gap:5px;
}

</style>
</head>

<body>

<h2>Training Log Viewer</h2>

<div id="dropArea">
ドラッグ&ドロップ<br>
またはクリックして選択
</div>

<input type="file" id="fileInput" hidden>

<div id="plots"></div>

<script>

const dropArea=document.getElementById("dropArea")
const fileInput=document.getElementById("fileInput")
const plotsDiv=document.getElementById("plots")

dropArea.onclick=()=>fileInput.click()

fileInput.onchange=e=>{
const f=e.target.files[0]
if(f) handleFile(f)
}

dropArea.ondragover=e=>{
e.preventDefault()
dropArea.style.background="#eef"
}

dropArea.ondragleave=e=>{
dropArea.style.background="white"
}

dropArea.ondrop=e=>{
e.preventDefault()
dropArea.style.background="white"

const f=e.dataTransfer.files[0]
if(f) handleFile(f)
}

function handleFile(file){

const reader=new FileReader()

reader.onload=e=>{
parseJSONL(e.target.result)
}

reader.readAsText(file)

}

function cleanXY(x,y){

const x2=[]
const y2=[]

for(let i=0;i<x.length;i++){
if(y[i]!=null){
x2.push(x[i])
y2.push(y[i])
}
}

return [x2,y2]

}

function parseJSONL(text){

plotsDiv.innerHTML=""

const lines=text.split("\n")

const kimg=[]
const loss=[]
const lr=[]
const speed=[]
const mem=[]

for(const line of lines){

if(!line.trim()) continue

const data=JSON.parse(line)

if("Progress/kimg" in data){

kimg.push(data["Progress/kimg"])

loss.push(data["Loss/loss"] ?? null)
lr.push(data["Loss/learning_rate"] ?? null)
speed.push(data["Timing/sec_per_kimg"] ?? null)
mem.push(data["Resources/peak_gpu_mem_gb"] ?? null)

}

}

makeGraph("Loss vs Progress","Loss","Progress (kimg)",...cleanXY(kimg,loss))
makeGraph("Learning Rate Schedule","Learning Rate","Progress (kimg)",...cleanXY(kimg,lr))
makeGraph("Training Speed","Seconds per kimg","Progress (kimg)",...cleanXY(kimg,speed))
makeGraph("GPU Memory Usage","Peak GPU Memory (GB)","Progress (kimg)",...cleanXY(kimg,mem))

}

function makeGraph(title,ylabel,xlabel,x,y){

const box=document.createElement("div")
box.className="graphBox"

const plot=document.createElement("div")

const controls=document.createElement("div")
controls.className="controls"

const ymin=document.createElement("input")
ymin.type="range"

const ymax=document.createElement("input")
ymax.type="range"

const yminLabel=document.createElement("span")
const ymaxLabel=document.createElement("span")

const yMinValue=Math.min(...y)
const yMaxValue=Math.max(...y)

ymin.min=yMinValue
ymin.max=yMaxValue
ymin.step=(yMaxValue-yMinValue)/500
ymin.value=yMinValue

ymax.min=yMinValue
ymax.max=yMaxValue
ymax.step=(yMaxValue-yMinValue)/500
ymax.value=yMaxValue

yminLabel.textContent="Ymin"
ymaxLabel.textContent="Ymax"

controls.append(yminLabel,ymin,ymaxLabel,ymax)

const savePNG=document.createElement("button")
savePNG.textContent="PNG保存"

const saveSVG=document.createElement("button")
saveSVG.textContent="SVG保存"

const widthInput=document.createElement("input")
widthInput.type="number"
widthInput.placeholder="width"
widthInput.value=1200

const heightInput=document.createElement("input")
heightInput.type="number"
heightInput.placeholder="height"
heightInput.value=800

controls.append(widthInput,heightInput,savePNG,saveSVG)

box.append(plot,controls)
plotsDiv.append(box)

const trace={
x:x,
y:y,
mode:"lines",
type:"scatter"
}

const layout={
title:title,
xaxis:{title:xlabel},
yaxis:{title:ylabel}
}

Plotly.newPlot(plot,[trace],layout,{displayModeBar:false})

function updateRange(){

const min=parseFloat(ymin.value)
const max=parseFloat(ymax.value)

Plotly.relayout(plot,{
"yaxis.range":[min,max]
})

}

ymin.oninput=updateRange
ymax.oninput=updateRange

savePNG.onclick=()=>{

const w=parseInt(widthInput.value)
const h=parseInt(heightInput.value)

Plotly.toImage(plot,{
format:"png",
width:w,
height:h
}).then(url=>{
download(url,title+".png")
})

}

saveSVG.onclick=()=>{

Plotly.toImage(plot,{
format:"svg"
}).then(url=>{
download(url,title+".svg")
})

}

}

function download(url,name){

const a=document.createElement("a")
a.href=url
a.download=name
a.click()

}

</script>

</body>
</html>
