<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Training Log Viewer</title>

<link rel="stylesheet" href="./../../css/common-style.css">
<link rel="stylesheet" href="./../../css/common-style2.css">
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
.graphBox{
margin-top:30px;
border:1px solid #ccc;
padding:10px;
}

.plotWrapper{
width:100%;
aspect-ratio: 3 / 2;
}

.plot{
width:100%;
height:100%;
}

#resizeContainer{
position:relative;
width:100%;
display:flex;
justify-content:center;
}

#mainContainer{
width:900px;
}

#resizeHandle{
width:10px;
background:#888;
cursor:ew-resize;
}

#resizeHandle:hover{
background:#555;
}

#sliderArea{
width:100%;
max-width:500px;
display:flex;
justify-content:center;
margin:0 auto 15px auto;
}

#maSlider{
width:50%;
}
</style>
</head>

<body>

<h1>Training Log Viewer</h1>

<div id="resizeContainer">

  <div id="mainContainer">

    <div id="dropArea">
    ドラッグ&ドロップ<br>またはクリック
    </div>

    <!-- ★移動平均スライダー -->
    <div id="sliderArea">
      移動平均: <span id="maValue">010</span>
      <input type="range" id="maSlider" min="1" max="200" value="10">
    </div>

    <input type="file" id="fileInput" hidden>
    <div id="plots"></div>

  </div>

  <div id="resizeHandle"></div>

</div>

<script>

const dropArea=document.getElementById("dropArea")
const fileInput=document.getElementById("fileInput")
const plotsDiv=document.getElementById("plots")

const maSlider = document.getElementById("maSlider")
const maValue = document.getElementById("maValue")

let globalData = null

dropArea.onclick=()=>fileInput.click()

fileInput.onchange=e=>{
const f=e.target.files[0]
if(f) handleFile(f)
}

dropArea.ondragover=e=>{
e.preventDefault()
}

dropArea.ondrop=e=>{
e.preventDefault()
const f=e.dataTransfer.files[0]
if(f) handleFile(f)
}

function handleFile(file){
const reader=new FileReader()
reader.onload=e=>parseJSONL(e.target.result)
reader.readAsText(file)
}

/* =========================
   移動平均
========================= */
function movingAverage(arr, windowSize){

const result=[]

for(let i=0;i<arr.length;i++){

let sum=0
let count=0

for(let j=i-windowSize+1;j<=i;j++){
if(j>=0 && arr[j]!=null){
sum+=arr[j]
count++
}
}

result.push(count>0 ? sum/count : null)
}

return result
}

/* =========================
   JSONL解析
========================= */
function parseJSONL(text){

const lines=text.split("\n")

const kimg=[]
const loss=[]
const lr=[]
const speed=[]
const mem=[]

for(const line of lines){

if(!line.trim()) continue

const data=JSON.parse(line)

if("Progress/kimg" in data){
kimg.push(data["Progress/kimg"])
loss.push(data["Loss/loss"] ?? null)
lr.push(data["Loss/learning_rate"] ?? null)
speed.push(data["Timing/sec_per_kimg"] ?? null)
mem.push(data["Resources/peak_gpu_mem_gb"] ?? null)
}
}

globalData={kimg,loss,lr,speed,mem}

redrawAllGraphs()
}

/* =========================
   グラフ再描画
========================= */
function redrawAllGraphs(){

if(!globalData) return

plotsDiv.innerHTML=""

const w=parseInt(maSlider.value)

makeGraph("Loss vs Progress","Loss","Progress (kimg)",globalData.kimg,globalData.loss,w)
makeGraph("Learning Rate","LR","Progress (kimg)",globalData.kimg,globalData.lr,w)
makeGraph("Speed","sec/kimg","Progress (kimg)",globalData.kimg,globalData.speed,w)
makeGraph("GPU Memory","GB","Progress (kimg)",globalData.kimg,globalData.mem,w)
}

/* =========================
   グラフ生成
========================= */
function makeGraph(title,ylabel,xlabel,x,y,windowSize){

if(x.length===0) return

const box=document.createElement("div")
box.className="graphBox"

const wrapper=document.createElement("div")
wrapper.className="plotWrapper"

const plot=document.createElement("div")
plot.className="plot"

wrapper.appendChild(plot)

const controls=document.createElement("div")

const widthInput=document.createElement("input")
widthInput.type="number"
widthInput.value=1200

const heightInput=document.createElement("input")
heightInput.type="number"
heightInput.value=800

const savePNG=document.createElement("button")
savePNG.textContent="PNG"

const saveSVG=document.createElement("button")
saveSVG.textContent="SVG"

controls.append(widthInput,heightInput,savePNG,saveSVG)

box.append(wrapper,controls)
plotsDiv.append(box)

/* ★移動平均計算 */
const ma = movingAverage(y, windowSize)

/* ★2本の線 */
const trace1={
x:x,
y:y,
mode:"lines",
name:"raw"
}

const trace2={
x:x,
y:ma,
mode:"lines",
name:"moving avg",
line:{width:3}
}

const layout={
title:title,
xaxis:{title:xlabel},
yaxis:{title:ylabel}
}

Plotly.newPlot(plot,[trace1,trace2],layout)

/* アスペクト比 */
function updateAspect(){
const w=parseFloat(widthInput.value)
const h=parseFloat(heightInput.value)

if(w>0 && h>0){
wrapper.style.aspectRatio = `${w} / ${h}`
Plotly.Plots.resize(plot)
}
}

widthInput.oninput=updateAspect
heightInput.oninput=updateAspect
updateAspect()

/* 保存 */
savePNG.onclick=()=>{
Plotly.toImage(plot,{
format:"png",
width:parseInt(widthInput.value),
height:parseInt(heightInput.value)
}).then(url=>download(url,title+".png"))
}

saveSVG.onclick=()=>{
Plotly.toImage(plot,{
format:"svg",
width:parseInt(widthInput.value),
height:parseInt(heightInput.value)
}).then(url=>download(url,title+".svg"))
}

}

function download(url,name){
const a=document.createElement("a")
a.href=url
a.download=name
a.click()
}

/* =========================
   スライダー
========================= */
maSlider.oninput=()=>{
maValue.textContent=maSlider.value.padStart(3, '0')
redrawAllGraphs()
}

/* =========================
   横リサイズ
========================= */
const mainContainer = document.getElementById("mainContainer")
const handle = document.getElementById("resizeHandle")

let isResizing = false
let startX = 0
let startWidth = 0

handle.addEventListener("mousedown", startResize)
handle.addEventListener("touchstart", startResize)

function startResize(e){

e.preventDefault()

isResizing = true

const ev = e.touches ? e.touches[0] : e

startX = ev.clientX
startWidth = mainContainer.offsetWidth

document.addEventListener("mousemove", resize)
document.addEventListener("mouseup", stopResize)

document.addEventListener("touchmove", resize)
document.addEventListener("touchend", stopResize)
}

function resize(e){

if(!isResizing) return

const ev = e.touches ? e.touches[0] : e
const dx = ev.clientX - startX

let newWidth = startWidth + dx * 2
newWidth = Math.max(300, Math.min(window.innerWidth, newWidth))

mainContainer.style.width = newWidth + "px"

document.querySelectorAll(".plot").forEach(p=>{
Plotly.Plots.resize(p)
})
}

function stopResize(){

isResizing = false

document.removeEventListener("mousemove", resize)
document.removeEventListener("mouseup", stopResize)

document.removeEventListener("touchmove", resize)
document.removeEventListener("touchend", stopResize)
}

</script>

</body>
</html>
