<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microphone Analyzer</title>

<link rel="stylesheet" href="./../../css/common-style.css">
<link rel="stylesheet" href="./../../css/common-style2.css">
<style>

#controls{
display:flex;
margin-bottom:10px;
}


</style>
</head>

<body>

<h1>マイク音声リアルタイム解析</h1>

<div id="controls">
<button id="startBtn">マイク開始</button>
<button id="stopBtn">停止</button>
</div>

<canvas id="waveCanvas" width="500" height="150"></canvas>
<canvas id="fftCanvas" width="500" height="150"></canvas>

<script>

const waveCanvas=document.getElementById("waveCanvas")
const fftCanvas=document.getElementById("fftCanvas")

const waveCtx=waveCanvas.getContext("2d")
const fftCtx=fftCanvas.getContext("2d")

const startBtn=document.getElementById("startBtn")
const stopBtn=document.getElementById("stopBtn")

let audioContext
let analyser
let dataArray
let freqArray
let source
let stream

let running=false

async function startMic(){

stream=await navigator.mediaDevices.getUserMedia({audio:true})

audioContext=new AudioContext()

source=audioContext.createMediaStreamSource(stream)

analyser=audioContext.createAnalyser()

analyser.fftSize=2048

const bufferLength=analyser.fftSize
dataArray=new Uint8Array(bufferLength)

const freqLength=analyser.frequencyBinCount
freqArray=new Uint8Array(freqLength)

source.connect(analyser)

running=true
draw()

}

function stopMic(){

running=false

if(stream){

stream.getTracks().forEach(track=>track.stop())

}

if(audioContext){
audioContext.close()
}

}

function draw(){

if(!running) return

requestAnimationFrame(draw)

analyser.getByteTimeDomainData(dataArray)
analyser.getByteFrequencyData(freqArray)

drawWave()
drawFFT()

}

function drawWave(){

waveCtx.clearRect(0,0,waveCanvas.width,waveCanvas.height)

waveCtx.beginPath()

const sliceWidth=waveCanvas.width/dataArray.length
let x=0

for(let i=0;i<dataArray.length;i++){

const v=dataArray[i]/128.0
const y=v*waveCanvas.height/2

if(i===0){
waveCtx.moveTo(x,y)
}else{
waveCtx.lineTo(x,y)
}

x+=sliceWidth

}

waveCtx.stroke()

}

function drawFFT(){

fftCtx.clearRect(0,0,fftCanvas.width,fftCanvas.height)

const barWidth=fftCanvas.width/freqArray.length

for(let i=0;i<freqArray.length;i++){

const v=freqArray[i]/255
const h=v*fftCanvas.height

fftCtx.fillRect(i*barWidth,fftCanvas.height-h,barWidth,h)

}

}

startBtn.onclick=startMic
stopBtn.onclick=stopMic

</script>

</body>
</html>
