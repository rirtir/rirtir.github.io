<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image → Movie</title>

<link rel="stylesheet" href="./../../css/common-style.css">
<link rel="stylesheet" href="./../../css/common-style2.css">
<style>
video{
width:100%;
max-height:240px;
background:black;
}

#slider{
width:100%;
}

.frameButtons{
display:flex;
gap:10px;
}

</style>
</head>

<body>

<h2>画像 → 動画</h2>

<div id="dropArea">
ドラッグ&ドロップ<br>
またはクリック
</div>

<input type="file" id="fileInput" multiple hidden accept="image/png">

<br>

FPS
<input type="range" id="fps" min="1" max="60" value="15">
<span id="fpsValue">15</span>

<br><br>

<button id="create">動画生成</button>


<script src="https://unpkg.com/lamejs@1.2.0/lame.min.js"></script>
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>


<script>

const dropArea=document.getElementById("dropArea")
const fileInput=document.getElementById("fileInput")

let files=[]

dropArea.onclick=()=>fileInput.click()

fileInput.onchange=e=>{
files=Array.from(e.target.files)
}

dropArea.ondragover=e=>{
e.preventDefault()
dropArea.style.background="#eef"
}

dropArea.ondragleave=e=>{
dropArea.style.background="white"
}

dropArea.ondrop=e=>{

e.preventDefault()
dropArea.style.background="white"

files=Array.from(e.dataTransfer.files)

}

const fpsSlider=document.getElementById("fps")
const fpsValue=document.getElementById("fpsValue")

fpsSlider.oninput=()=>{
fpsValue.textContent=fpsSlider.value
}

document.getElementById("create").onclick=async()=>{

if(files.length===0){
alert("画像がありません")
return
}

const { createFFmpeg, fetchFile } = FFmpeg

const ffmpeg=createFFmpeg({log:true})

await ffmpeg.load()

// 画像を書き込む
for(let i=0;i<files.length;i++){

const name=`img${i}.png`

ffmpeg.FS("writeFile",name,await fetchFile(files[i]))

}

// ffmpeg 実行
const fps=fpsSlider.value

await ffmpeg.run(
"-framerate",fps,
"-i","img%d.png",
"-c:v","libx264",
"-pix_fmt","yuv420p",
"output.mp4"
)

const data=ffmpeg.FS("readFile","output.mp4")

const videoBlob=new Blob([data.buffer],{type:"video/mp4"})

const url=URL.createObjectURL(videoBlob)

const a=document.createElement("a")
a.href=url
a.download="output.mp4"
a.click()

}

</script>

</body>
</html>
