<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>9x9 Block Puzzle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- =========================
     Title Screen
========================= -->
<div id="titleScreen" class="screen active">
    <div class="titleContainer">
        <h1>9×9 Block Puzzle</h1>
        <button id="normalModeButton" class="bigButton">通常モード</button>
        <button id="battleModeButton" class="bigButton">対戦モード</button>
    </div>
</div>

<!-- =========================
     Game Screen
========================= -->
<div id="gameScreen" class="screen">
    <div id="game">

        <!-- Top Buttons -->
        <div id="topBar">
            <button id="backButton">タイトルへ</button>
            <button id="undoButton">アンドゥ</button>
            <button id="restartButton">リスタート</button>
            <button id="handButton">左右変更</button>
        </div>

        <!-- Header -->
        <div id="header">
            <div id="title">9×9 Block Puzzle</div>
            <div id="score">Score: 0</div>
            <div id="enemyScore" class="hidden">Enemy: 0</div>
            <div id="combo"></div>
            <div id="message"></div>
        </div>

        <!-- Enemy Pieces -->
        <div id="enemyArea" class="hidden">
            <div class="pieceSlot enemySlot" id="enemySlot0"></div>
            <div class="pieceSlot enemySlot" id="enemySlot1"></div>
            <div class="pieceSlot enemySlot" id="enemySlot2"></div>
        </div>

        <!-- Board -->
        <div id="board"></div>

        <!-- Player Pieces -->
        <div id="pieceArea">
            <div class="pieceSlot" id="slot0"></div>
            <div class="pieceSlot" id="slot1"></div>
            <div class="pieceSlot" id="slot2"></div>
        </div>

    </div>
</div>

<!-- Drag Layer -->
<div id="dragLayer">
    <canvas id="dragPiece"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
