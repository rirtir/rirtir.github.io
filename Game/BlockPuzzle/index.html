<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>9x9 Block Puzzle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- =========================
     Title Screen
========================= -->
<div id="titleScreen" class="screen active">
    <div class="titleContainer">
        <h1>9×9 Block Puzzle</h1>
        <button id="normalModeButton" class="bigButton">通常モード</button>

        <button id="battleAIButton" class="bigButton">AI対戦モード</button>
        <button id="battle2PButton" class="bigButton">2人で対戦モード</button>
        </div>
    </div>
</div>

<!-- =========================
     Game Screen
========================= -->
<div id="gameScreen" class="screen">
    <div id="game">

        <!-- Top Buttons -->
        <div id="topBar">
            <div id="scores">
                <div id="score">Score: 0</div>
                <div id="enemyScore" class="hidden">Enemy: 0</div>
            </div>
            <div class="topButtons">
                <button id="faceButton" class="hidden">
                    <!-- ⇄ -->
                    <img id="faceIcon" src="./../../assets/icons/faceicon_01.png">
                </button>
                <button id="handButton">
                    <img id="handIcon" src="./../../assets/icons/hand_white.svg">
                </button>
                <button id="undoButton">
                    <img id="undoIcon" src="./../../assets/icons/undo2_white.svg">
                </button>
                <button id="restartButton">
                    <img id="restartIcon" src="./../../assets/icons/reload_white.svg">
                </button>
                <button id="backButton">
                    <img id="backIcon" src="./../../assets/icons/home_white.svg">
                </button>
            </div>
        </div>

        <!-- Header -->
        <div id="header">
            <!-- <div id="score">Score: 0</div> -->
            <div id="combo"></div>
            <div id="message"></div>
        </div>

        <!-- Enemy Pieces -->
        <div id="enemyArea" class="hidden">
            <div class="pieceSlot enemySlot" id="enemySlot0"></div>
            <div class="pieceSlot enemySlot" id="enemySlot1"></div>
            <div class="pieceSlot enemySlot" id="enemySlot2"></div>
        </div>

        <!-- Board -->
        <div id="board"></div>

        <!-- Player Pieces -->
        <div id="pieceArea">
            <div class="pieceSlot" id="slot0"></div>
            <div class="pieceSlot" id="slot1"></div>
            <div class="pieceSlot" id="slot2"></div>
        </div>

    </div>
</div>

<!-- Drag Layer -->
<div id="dragLayer">
    <canvas id="dragPiece"></canvas>
</div>

<!-- =========================
     Confirm Popup
========================= -->
<div id="confirmPopup" class="popup hidden">
    <div class="popupInner">
        <div id="popupMessage">実行しますか？</div>

        <div class="popupButtons">
            <button id="popupCancel">キャンセル</button>
            <button id="popupOk">OK</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
