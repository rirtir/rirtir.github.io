<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle</title>
<style>
body {
    margin:0;
    overflow:auto;
    background:#222;
}
#ui {
    position:fixed;
    top:10px;
    left:10px;
    z-index:10;
    background:rgba(0,0,0,0.6);
    color:white;
    padding:10px;
}
canvas {
    display:block;
}
</style>
</head>
<body>

<div id="ui">
<input type="file" id="fileInput"><br>
横:<input type="number" id="cols" value="4" style="width:50px">
縦:<input type="number" id="rows" value="4" style="width:50px">
<button id="start">開始</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let image;
let pieces = [];
let groups = {};
let neighbors = {};

let ROWS = 4, COLS = 4;

let board = {x:800, y:600, w:0, h:0}; // 中央寄せっぽい位置

// canvasを広くする
canvas.width = 3000;
canvas.height = 3000;

// =========================
// 初期化
// =========================
document.getElementById("start").onclick = () => {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return;

    ROWS = parseInt(rows.value);
    COLS = parseInt(cols.value);

    const img = new Image();
    img.onload = ()=>{
        image = img;
        setup();
    };
    img.src = URL.createObjectURL(file);
};

// =========================
// セットアップ
// =========================
function setup(){
    pieces = [];
    groups = {};
    neighbors = {};

    const scale = Math.min(800 / image.width, 600 / image.height);

    board.w = image.width * scale;
    board.h = image.height * scale;

    const pw = board.w / COLS;
    const ph = board.h / ROWS;

    let tabs = [];

    // 凹凸生成（逆になる保証あり）
    for(let y=0;y<ROWS;y++){
        tabs[y]=[];
        for(let x=0;x<COLS;x++){
            tabs[y][x] = {
                top: y===0 ? 0 : -tabs[y-1][x].bottom,
                left: x===0 ? 0 : -tabs[y][x-1].right,
                right: x===COLS-1 ? 0 : (Math.random()>0.5?1:-1),
                bottom: y===ROWS-1 ? 0 : (Math.random()>0.5?1:-1)
            };
        }
    }

    let id=0;

    for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){

            const piece = {
                id,
                x: Math.random()*canvas.width,
                y: Math.random()*canvas.height,
                correctX: board.x + x*pw,
                correctY: board.y + y*ph,
                w: pw,
                h: ph,
                sx: x*(image.width/COLS),
                sy: y*(image.height/ROWS),
                sw: image.width/COLS,
                sh: image.height/ROWS,
                tab: tabs[y][x],
                group:id,
                fixed:false,
                gx:x,
                gy:y
            };

            pieces.push(piece);
            groups[id] = [piece];

            // 隣接マップ
            neighbors[id] = {
                top: y>0 ? id-COLS : null,
                bottom: y<ROWS-1 ? id+COLS : null,
                left: x>0 ? id-1 : null,
                right: x<COLS-1 ? id+1 : null
            };

            id++;
        }
    }
}

// =========================
// パス生成
// =========================
function createPath(p){
    const path = new Path2D();
    const t = p.tab;
    const w = p.w, h = p.h;
    const s = Math.min(w,h)*0.3;

    path.moveTo(0,0);

    // top
    if(t.top===0) path.lineTo(w,0);
    else{
        path.lineTo(w/2 - s,0);
        path.bezierCurveTo(w/2 - s/2, t.top*s, w/2 + s/2, t.top*s, w/2 + s,0);
        path.lineTo(w,0);
    }

    // right
    if(t.right===0) path.lineTo(w,h);
    else{
        path.lineTo(w,h/2 - s);
        path.bezierCurveTo(w + t.right*s, h/2 - s/2, w + t.right*s, h/2 + s/2, w, h/2 + s);
        path.lineTo(w,h);
    }

    // bottom
    if(t.bottom===0) path.lineTo(0,h);
    else{
        path.lineTo(w/2 + s,h);
        path.bezierCurveTo(w/2 + s/2, h + t.bottom*s, w/2 - s/2, h + t.bottom*s, w/2 - s, h);
        path.lineTo(0,h);
    }

    // left
    if(t.left===0){
        path.closePath();
    }else{
        path.lineTo(0,h/2 + s);
        path.bezierCurveTo(t.left*s, h/2 + s/2, t.left*s, h/2 - s/2, 0, h/2 - s);
        path.closePath();
    }

    return path;
}

// =========================
// 描画
// =========================
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // ボード
    ctx.fillStyle="#444";
    ctx.fillRect(board.x, board.y, board.w, board.h);

    for(let p of pieces){
        ctx.save();
        ctx.translate(p.x, p.y);

        const path = createPath(p);
        ctx.clip(path);

        ctx.drawImage(image,p.sx,p.sy,p.sw,p.sh,0,0,p.w,p.h);

        ctx.restore();
    }
}

// =========================
// 操作
// =========================
let dragging = null;
let last = null;

canvas.addEventListener("pointerdown", e=>{
    const x = e.offsetX;
    const y = e.offsetY;

    for(let p of [...pieces].reverse()){
        if(
            x>p.x && x<p.x+p.w &&
            y>p.y && y<p.y+p.h &&
            !p.fixed
        ){
            dragging = p.group;
            last = {x,y};
            break;
        }
    }
});

canvas.addEventListener("pointermove", e=>{
    if(dragging===null) return;

    const x = e.offsetX;
    const y = e.offsetY;

    const dx = x-last.x;
    const dy = y-last.y;

    for(let p of groups[dragging]){
        p.x += dx;
        p.y += dy;
    }

    last = {x,y};
});

canvas.addEventListener("pointerup", ()=>{
    if(dragging!==null){
        snap(dragging);
        merge(dragging);
    }
    dragging=null;
});

// =========================
// スナップ
// =========================
function snap(gid){
    for(let p of groups[gid]){
        const dx = p.x - p.correctX;
        const dy = p.y - p.correctY;

        if(Math.hypot(dx,dy)<30){
            p.x = p.correctX;
            p.y = p.correctY;
            p.fixed = true;
        }
    }
}

// =========================
// マージ（隣接のみ）
// =========================
function merge(gid){
    const threshold = 30;

    for(let p of groups[gid]){

        const n = neighbors[p.id];

        for(let dir of ["top","bottom","left","right"]){
            const nid = n[dir];
            if(nid===null) continue;

            const other = pieces[nid];
            if(other.group === p.group) continue;

            const dx = p.x - other.x;
            const dy = p.y - other.y;

            const cdx = p.correctX - other.correctX;
            const cdy = p.correctY - other.correctY;

            if(Math.abs(dx-cdx)<threshold && Math.abs(dy-cdy)<threshold){

                // 位置補正
                const offsetX = other.x + cdx;
                const offsetY = other.y + cdy;

                const moveX = offsetX - p.x;
                const moveY = offsetY - p.y;

                for(let gp of groups[gid]){
                    gp.x += moveX;
                    gp.y += moveY;
                }

                mergeGroups(p.group, other.group);
                return;
            }
        }
    }
}

function mergeGroups(a,b){
    const A = groups[a];
    const B = groups[b];

    for(let p of B){
        p.group = a;
        A.push(p);
    }

    delete groups[b];
}

// =========================
// loop
// =========================
function loop(){
    draw();
    requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
