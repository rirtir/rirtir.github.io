<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Puzzle</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  touch-action: none;
  background:#222;
}

#viewport {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

#world {
  position: absolute;
  transform-origin: 0 0;
}

canvas {
  display:block;
}

#ui {
  position:fixed;
  top:10px;
  left:10px;
  z-index:10;
  background:rgba(0,0,0,0.6);
  color:white;
  padding:10px;
}
</style>
</head>
<body>

<div id="ui">
<input type="file" id="fileInput"><br>
横:<input type="number" id="cols" value="4" style="width:50px">
縦:<input type="number" id="rows" value="4" style="width:50px">
<button id="start">開始</button>
</div>

<div id="viewport">
  <div id="world">
    <canvas id="canvas"></canvas>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const world = document.getElementById("world");

// =========================
// DPR Fix
// =========================
const dpr = Math.min(devicePixelRatio, 1.5);
const WORLD_SIZE = 2000;

canvas.width = WORLD_SIZE * dpr;
canvas.height = WORLD_SIZE * dpr;

canvas.style.width = WORLD_SIZE + "px";
canvas.style.height = WORLD_SIZE + "px";

ctx.scale(dpr, dpr);

// =========================
// Camera
// =========================
const MIN_SCALE = 0.3;
const MAX_SCALE = 3;

let camera = { x: 0, y: 0, scale: 1 };

function clampCamera(){

  camera.scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, camera.scale));

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const maxX = 0;
  const maxY = 0;

  const minX = vw - WORLD_SIZE * camera.scale;
  const minY = vh - WORLD_SIZE * camera.scale;

  camera.x = Math.min(maxX, Math.max(minX, camera.x));
  camera.y = Math.min(maxY, Math.max(minY, camera.y));
}

function updateTransform(){

  clampCamera();

  world.style.transform =
    `translate(${camera.x}px, ${camera.y}px) scale(${camera.scale})`;
}

// =========================
// Utils
// =========================
function screenToWorld(x,y){
  return {
    x: (x - camera.x)/camera.scale,
    y: (y - camera.y)/camera.scale
  };
}

function getDistance(p1,p2){
  return Math.hypot(p1.x-p2.x,p1.y-p2.y);
}

// =========================
// Puzzle
// =========================
let image;

let pieces = [];
let drawOrder = [];
let pieceMap = {};

let groups = {};
let neighbors = {};

let ROWS = 4;
let COLS = 4;

let board = {
  x: WORLD_SIZE/2 - 400,
  y: WORLD_SIZE/2 - 300,
  w: 800,
  h: 600
};

// =========================
// Setup
// =========================
start.onclick = ()=>{

  const file = fileInput.files[0];
  if(!file) return;

  ROWS = parseInt(cols.value);
  COLS = parseInt(rows.value);

  const img = new Image();

  img.onload = ()=>{
    image = img;
    setup();
  };

  img.src = URL.createObjectURL(file);
};

function setup(){

  pieces = [];
  drawOrder = [];
  pieceMap = {};
  groups = {};
  neighbors = {};

  // =========================
  // Display Scale
  // =========================
  const displayScale = Math.min(
    board.w / image.width,
    board.h / image.height
  );

  const actualW = image.width * displayScale;
  const actualH = image.height * displayScale;

  board.w = actualW;
  board.h = actualH;

  const pw = actualW / COLS;
  const ph = actualH / ROWS;

  const tabSize = Math.min(pw,ph) * 0.3;

  const marginImg = tabSize / displayScale;

  let tabs = [];

  for(let y=0;y<ROWS;y++){

    tabs[y] = [];

    for(let x=0;x<COLS;x++){

      tabs[y][x] = {

        top:
          y===0
          ?0
          :-tabs[y-1][x].bottom,

        left:
          x===0
          ?0
          :-tabs[y][x-1].right,

        right:
          x===COLS-1
          ?0
          :(Math.random()>0.5?1:-1),

        bottom:
          y===ROWS-1
          ?0
          :(Math.random()>0.5?1:-1)
      };
    }
  }

  let id = 0;

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){

      const margin = tabSize;

      let px, py;

      do{
        px = Math.random()*(WORLD_SIZE-200)+100;
        py = Math.random()*(WORLD_SIZE-200)+100;

      }while(
        px > board.x-100 &&
        px < board.x+board.w+100 &&
        py > board.y-100 &&
        py < board.y+board.h+100
      );

      const piece = {

        id,

        x:px,
        y:py,

        correctX: board.x + x*pw - margin,
        correctY: board.y + y*ph - margin,

        w: pw + margin*2,
        h: ph + margin*2,

        drawW:
          (image.width / COLS) * displayScale
          + margin*2,

        drawH:
          (image.height / ROWS) * displayScale
          + margin*2,

        sx: x*(image.width/COLS) - marginImg,
        sy: y*(image.height/ROWS) - marginImg,

        sw: (image.width/COLS) + marginImg*2,
        sh: (image.height/ROWS) + marginImg*2,

        tab: tabs[y][x],

        group:id,

        fixed:false,

        margin
      };

      pieces.push(piece);
      drawOrder.push(piece);

      pieceMap[id] = piece;

      groups[id] = [piece];

      neighbors[id] = {
        top: y>0 ? id-COLS : null,
        bottom: y<ROWS-1 ? id+COLS : null,
        left: x>0 ? id-1 : null,
        right: x<COLS-1 ? id+1 : null
      };

      id++;
    }
  }
}

// =========================
// Draw
// =========================
function createPath(p){

  const path = new Path2D();

  const t = p.tab;

  const w = p.drawW;
  const h = p.drawH;

  const s = p.margin;

  path.moveTo(s,s);

  if(t.top===0){

    path.lineTo(w-s,s);

  }else{

    path.lineTo(w/2 - s, s);

    path.bezierCurveTo(
      w/2 - s/2,
      s - t.top*s,

      w/2 + s/2,
      s - t.top*s,

      w/2 + s,
      s
    );

    path.lineTo(w-s,s);
  }

  if(t.right===0){

    path.lineTo(w-s,h-s);

  }else{

    path.lineTo(w-s, h/2 - s);

    path.bezierCurveTo(
      w - s + t.right*s,
      h/2 - s/2,

      w - s + t.right*s,
      h/2 + s/2,

      w-s,
      h/2 + s
    );

    path.lineTo(w-s,h-s);
  }

  if(t.bottom===0){

    path.lineTo(s,h-s);

  }else{

    path.lineTo(w/2 + s, h-s);

    path.bezierCurveTo(
      w/2 + s/2,
      h - s + t.bottom*s,

      w/2 - s/2,
      h - s + t.bottom*s,

      w/2 - s,
      h-s
    );

    path.lineTo(s,h-s);
  }

  if(t.left===0){

    path.closePath();

  }else{

    path.lineTo(s, h/2 + s);

    path.bezierCurveTo(
      s - t.left*s,
      h/2 + s/2,

      s - t.left*s,
      h/2 - s/2,

      s,
      h/2 - s
    );

    path.closePath();
  }

  return path;
}

function draw(){

  ctx.clearRect(0,0,WORLD_SIZE,WORLD_SIZE);

  ctx.fillStyle = "#444";
  ctx.fillRect(board.x, board.y, board.w, board.h);

  for(let p of drawOrder){

    ctx.save();

    ctx.translate(p.x, p.y);

    const path = createPath(p);

    ctx.clip(path);

    ctx.drawImage(
      image,
      p.sx,
      p.sy,
      p.sw,
      p.sh,
      0,
      0,
      p.drawW,
      p.drawH
    );

    ctx.restore();
  }
}

// =========================
// Draw Order
// =========================
function bringGroupToFront(gid){

  const groupPieces = groups[gid];

  drawOrder = drawOrder.filter(p=>p.group!==gid);

  drawOrder.push(...groupPieces);
}

function sendFixedToBack(){

  const fixed = drawOrder.filter(p=>p.fixed);
  const unfixed = drawOrder.filter(p=>!p.fixed);

  drawOrder = [...fixed, ...unfixed];
}

// =========================
// Pointer
// =========================
let pointers = new Map();

let lastDist = null;

let draggingGroup = null;

document.addEventListener("pointerdown",(e)=>{

  pointers.set(
    e.pointerId,
    {x:e.clientX,y:e.clientY}
  );

  const pos = screenToWorld(e.clientX,e.clientY);

  for(let p of [...drawOrder].reverse()){

    if(
      pos.x>p.x &&
      pos.x<p.x+p.w &&
      pos.y>p.y &&
      pos.y<p.y+p.h &&
      !p.fixed
    ){

      draggingGroup = p.group;

      bringGroupToFront(draggingGroup);

      return;
    }
  }
});

document.addEventListener("pointermove",(e)=>{

  if(!pointers.has(e.pointerId)) return;

  const prev = pointers.get(e.pointerId);

  const dx = e.clientX - prev.x;
  const dy = e.clientY - prev.y;

  pointers.set(
    e.pointerId,
    {x:e.clientX,y:e.clientY}
  );

  if(pointers.size===2){

    const pts = Array.from(pointers.values());

    const center = {
      x:(pts[0].x+pts[1].x)/2,
      y:(pts[0].y+pts[1].y)/2
    };

    const dist = getDistance(pts[0],pts[1]);

    if(lastDist!==null){

      const before = screenToWorld(center.x, center.y);

      let newScale =
        camera.scale * (dist / lastDist);

      newScale =
        Math.max(MIN_SCALE,
        Math.min(MAX_SCALE,newScale));

      camera.scale = newScale;

      const after =
        screenToWorld(center.x, center.y);

      camera.x +=
        (after.x-before.x)*camera.scale;

      camera.y +=
        (after.y-before.y)*camera.scale;

      updateTransform();
    }

    lastDist = dist;

    return;
  }

  lastDist = null;

  if(draggingGroup!==null){

    for(let p of groups[draggingGroup]){

      p.x += dx / camera.scale;
      p.y += dy / camera.scale;
    }

  }else{

    camera.x += dx;
    camera.y += dy;

    updateTransform();
  }
});

document.addEventListener("pointerup",(e)=>{

  pointers.delete(e.pointerId);

  if(draggingGroup!==null){

    snap(draggingGroup);

    merge(draggingGroup);

    sendFixedToBack();
  }

  draggingGroup = null;

  if(pointers.size<2){
    lastDist = null;
  }
});

// =========================
// Snap & Merge
// =========================
function snap(gid){

  for(let p of groups[gid]){

    const dx = p.x-p.correctX;
    const dy = p.y-p.correctY;

    if(Math.hypot(dx,dy)<30){

      p.x = p.correctX;
      p.y = p.correctY;

      p.fixed = true;
    }
  }
}

function merge(gid){

  const threshold = 30;

  for(let p of groups[gid]){

    const n = neighbors[p.id];

    for(let dir of ["top","bottom","left","right"]){

      const nid = n[dir];

      if(nid===null) continue;

      const other = pieceMap[nid];

      if(other.group===p.group) continue;

      const dx = p.x-other.x;
      const dy = p.y-other.y;

      const cdx =
        p.correctX-other.correctX;

      const cdy =
        p.correctY-other.correctY;

      if(
        Math.abs(dx-cdx)<threshold &&
        Math.abs(dy-cdy)<threshold
      ){

        const moveX =
          other.x + cdx - p.x;

        const moveY =
          other.y + cdy - p.y;

        for(let gp of groups[gid]){

          gp.x += moveX;
          gp.y += moveY;
        }

        mergeGroups(
          p.group,
          other.group
        );

        return;
      }
    }
  }
}

function mergeGroups(a,b){

  const A = groups[a];
  const B = groups[b];

  for(let p of B){

    p.group = a;

    A.push(p);
  }

  delete groups[b];
}

// =========================
// Loop
// =========================
function loop(){

  draw();

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
