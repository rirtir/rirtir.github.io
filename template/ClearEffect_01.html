<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クリア演出</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #222;
  color: #fff;
  overflow: hidden;
}

#clearBtn {
  padding: 12px 24px;
  font-size: 18px;
  background: #ff9800;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  z-index: 1;
}

#clearOverlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
  flex-direction: column;
}

/* テキスト */
.clearText {
  font-size: 48px;
  font-weight: bold;
  color: #fff;
  text-shadow:
    0 0 8px #fff,
    0 0 16px #ff0,
    0 0 24px #f0f;
  transform: scale(0);
  opacity: 0;
  animation: popText 1s forwards;
  position: relative;
  z-index: 2;
}

@keyframes popText {
  0% { transform: scale(0); opacity: 0; }
  1% { transform: scale(2); opacity: 1; }
  15% { transform: scale(1); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* 横ライン */
.clearLine {
  position: absolute;
  left: 0;
  height: 0px;
  width: 100%;
  background: linear-gradient(
    to right,
    transparent,
    #fff,
    rgb(255, 255, 148),
    #fff,
    transparent
  );
  /* filter: blur(2px); */
  top: 100%;
  margin-top: -18px; /* ← 微調整用（例: -24px） */
  transform: translateY(-50%);
  z-index: 1;
}

/* パーティクル */
.particle {
  position: absolute;
  width: 24px;
  height: 24px;
  background: rgb(255, 243, 174);
  clip-path: polygon(
    50% 0%, 55% 45%, 75% 50%, 55% 55%, 50% 100%, 45% 55%, 25% 50%, 45% 45%
  );

  /* グロー */
  /* box-shadow:
    0 0 6px #fff,
    0 0 12px #ff0,
    0 0 18px #f0f; */

  transform: translate(0,0) scale(1);
  opacity: 1;
}
</style>
</head>
<body>

<button id="clearBtn">クリアボタン</button>
<div id="clearOverlay"></div>

<script>
const btn = document.getElementById('clearBtn');
const overlay = document.getElementById('clearOverlay');

btn.addEventListener('click', () => {
  showClearEffect({
    x: '50%',
    y: '100px'
  });
})

function showClearEffect(pos = {}) {
  const {
    x = '50%',
    y = '50%'
  } = pos;
  overlay.innerHTML = '';

  // ===== ラッパー =====
  const wrapper = document.createElement('div');
  wrapper.style.position = 'absolute';
  wrapper.style.left = x;
  wrapper.style.top = y;
  wrapper.style.transform = 'translate(-50%, -50%)'; // 中心基準
  wrapper.style.textAlign = 'center';
  wrapper.style.width = '100%';
  overlay.appendChild(wrapper);

  // ===== テキスト =====
  const text = document.createElement('div');
  text.className = 'clearText';
  text.innerText = 'CLEAR';
  wrapper.appendChild(text);

  // ===== 横ライン =====
  const line = document.createElement('div');
  line.className = 'clearLine';
  wrapper.appendChild(line);

  // ===== パーティクル =====
  const particles = [];

  const spreadX = 1.0; // ← 横広がり
  const spreadY = 0.5; // ← 縦広がり

  for(let i=0;i<30;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = '50%';
    p.style.top = '50%';
    wrapper.appendChild(p);

    const angle = Math.random() * Math.PI * 2;
    const radius = 80 + Math.random() * 80;

    particles.push({
      el: p,
      endX: Math.cos(angle) * radius * spreadX,
      endY: Math.sin(angle) * radius * spreadY,
      delay: Math.random() * 100,
    });
  }

  const duration = 400;
  const fadeStart = 100;
  const totalTime = 600;

  const startTime = performance.now();

  function easeOut(t, k=4) {
    return 1 - Math.pow(1 - t, k);
  }

  function easeIn(t) {
    return Math.pow(t, 3);
  }

  function animate(now) {
    const elapsed = now - startTime;

    // ===== ライン伸びる =====
    if(elapsed > 100){
      const t = Math.min(1, (elapsed - 100) / 400);
      line.style.height = ((1 - easeOut(t)) * 30) + 'px';
    }

    particles.forEach(p => {
      const tRaw = (elapsed - p.delay) / duration;
      const t = Math.max(0, Math.min(1, tRaw));

      const moveT = easeOut(t, 3);
      const x = p.endX * moveT;
      const y = p.endY * moveT;

      let fadeT = (elapsed - p.delay - fadeStart) / (totalTime - fadeStart);
      fadeT = Math.max(0, Math.min(1, fadeT));
      const fade = easeIn(fadeT);

      const scale = 1 - fade;
      const opacity = 1 - fade;

      p.el.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) scale(${scale})`;
      p.el.style.opacity = opacity;
    });

    if(elapsed < totalTime){
      requestAnimationFrame(animate);
    } else {
      // パーティクルだけ削除
      particles.forEach(p => p.el.remove());
    }
  }

  requestAnimationFrame(animate);
}
</script>

</body>
</html>
